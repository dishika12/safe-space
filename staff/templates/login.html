<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safe Space — Staff Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-left">
      <div class="login-brand">
        <div class="login-shield">🛡</div>
        <h1 class="login-title">Safe Space</h1>
        <p class="login-subtitle">Staff Monitoring Portal</p>
      </div>
    </div>
    <div class="login-right">
      <form class="login-form" method="POST" action="{{ url_for('login') }}">
        <h2 class="form-heading">Sign in</h2>
        {% if error %}
          <div class="form-error">{{ error }}</div>
        {% endif %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" name="username" placeholder="staff1" required autofocus/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button class="form-submit" type="submit">Sign In →</button>
      </form>
    </div>
  </div>
</body>
</html>
